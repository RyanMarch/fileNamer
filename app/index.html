<!DOCTYPE html>
<html lang="en" translate="no" data-theme-style="tech">

<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg?v=2" />

    <meta name="apple-mobile-web-app-title" content="FileNamer" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest?v=2" />
    <script>
        // Theme initialization to prevent flicker
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme-mode', 'system');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.documentElement.removeAttribute('data-theme-mode');
            }
        })();
    </script>
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Primary SEO Metadata -->
    <title>FileNamer | Standardized Filename Builder & Renamer</title>
    <meta name="description"
        content="Design custom file naming templates and rename files in batch entirely in your browser. No sign-ups, no data storage, fully private.">
    <meta name="keywords"
        content="filename builder, file renamer, bulk file renamer, standardize filenames, document organization, productivity tool, no-database, local-first">
