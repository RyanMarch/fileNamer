<!DOCTYPE html>
<html lang="en" translate="no" data-theme-style="tech">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="FileNamer" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
    <script>
        // Theme initialization to prevent flicker
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme-mode', 'system');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.documentElement.removeAttribute('data-theme-mode');
            }
        })();
    </script>
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Primary SEO Metadata -->
    <title>FileNamer | Standardized Filename Builder & Renamer</title>
    <meta name="description"
        content="Design custom file naming templates and rename files in batch entirely in your browser. No sign-ups, no data storage, fully private.">
    <meta name="keywords"
        content="filename builder, file renamer, bulk file renamer, standardize filenames, document organization, productivity tool, no-database, local-first">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://filenamer.ryanmarch.me/app/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="FileNamer">
    <meta property="og:url" content="https://filenamer.ryanmarch.me/app/">
    <meta property="og:title" content="FileNamer | Standardized Filename Builder & Renamer">
    <meta property="og:description"
        content="Design custom file naming templates and rename files in batch entirely in your browser. No sign-ups, no data storage, fully private.">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

                    <line x1="17.5" y1="6.5" x2="17.5" y2="17.5" stroke="#3b82f6" stroke-width="2.2" />

                        stroke-linecap="round" />

                <h1>FileNamer</h1>

        <!-- Footer -->
