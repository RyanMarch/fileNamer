<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg?v=2" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-title" content="FileNamer" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <script>
        // Theme initialization to prevent flicker
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme-mode', 'system');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.documentElement.removeAttribute('data-theme-mode');
            }
        })();
    </script>

    <!-- Preconnect Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Global Style (Relative back up to root) -->
    <link rel="stylesheet" href="../css/style.css">

    <title>User Guide — FileNamer</title>
    <meta name="description"
        content="Learn how to use FileNamer to design custom file naming templates, fill parameters dynamically, and batch-rename local files entirely in your browser.">
    <link rel="canonical" href="https://filenamer.ryanmarch.me/docs/">

    <!-- Docs Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <script src="/js/components.js" type="module"></script>
    <script src="docs-components.js" type="module"></script>
</head>

<body class="user-docs-page docs-home-page">
    <div class="app-container">
        <!-- Mobile Navigation Overlay -->
        <div id="mobile-overlay" class="mobile-overlay"></div>

        <main class="page-container-fullwidth user-docs">
            <!-- Sidebar Navigation (visible only on mobile) -->
            <docs-sidebar></docs-sidebar>

            <!-- Right-side Content & Header Wrapper -->
            <div class="page-content-wrapper" style="width: 100%; display: flex; flex-direction: column; gap: 1.25rem;">
                <docs-header></docs-header>

                <!-- Content Area -->
                <docs-anchor-helper>
                    <div class="docs-hero">
                        <h1>Help Center</h1>
                        <p class="lead">Search guides, explore naming standards, and learn how to manage templates in
                            FileNamer.</p>
                        <docs-search></docs-search>
                    </div>

                    <h2 class="docs-categories-title">Explore Guides</h2>

                    <docs-grid
                        ids="getting-started,app-features,academic-papers,invoices-receipts,media-library,project-files,template-management,utm-builder"></docs-grid>

                </docs-anchor-helper>
            </div>
        </main>

        <!-- Footer -->
        <filenamer-footer></filenamer-footer>

        <!-- Lightbox Modal -->
        <div id="lightbox-modal" class="lightbox-modal" aria-hidden="true" role="dialog" aria-label="Image Viewer">
            <button class="lightbox-close" aria-label="Close image viewer">&times;</button>
            <img class="lightbox-content" id="lightbox-img" alt="">
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>
</body>

</html>
