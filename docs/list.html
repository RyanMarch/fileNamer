<!DOCTYPE html>
<html lang="en" translate="no" data-theme-style="tech">

<head>
    <meta charset="UTF-8">
    <link class="favicon-link" rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png?v=2" sizes="96x96" />
    <link class="favicon-link" rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg?v=2" />
    <link class="favicon-link" rel="shortcut icon" href="/assets/favicon/favicon.ico?v=2" />
    <link class="favicon-link" rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-title" content="FileNamer" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <script>
        // Theme initialization to prevent flicker
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme-mode', 'system');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.documentElement.removeAttribute('data-theme-mode');
            }
        })();
    </script>

    <!-- Preconnect Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Global Style -->
    <link rel="stylesheet" href="../css/style.css">

    <title>Search &amp; Categories — FileNamer Docs</title>
    <meta name="description" content="Browse articles and search results in the FileNamer help center.">

    <!-- Docs Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <script src="/js/components.js" type="module"></script>
    <script src="docs-components.js" type="module"></script>
</head>

<body class="user-docs-page docs-list-page">
    <div class="app-container">
        <!-- Mobile Navigation Overlay -->
        <div id="mobile-overlay" class="mobile-overlay"></div>

        <main class="page-container-fullwidth user-docs">
            <div class="page-content-wrapper" style="width: 100%; display: flex; flex-direction: column; gap: 1.25rem;">
                <docs-header></docs-header>

                <!-- List Content Area -->
                <div class="list-container">
                    <a href="index.html" class="list-back-home">
                        <div class="logo-group">
                            <filenamer-logo style="width: 1.85rem; height: 1.85rem; flex-shrink: 0;"></filenamer-logo>
                            <span class="logo-text">FileNamer</span>
                        </div>
                        <span class="back-link-text">← Help Center</span>
                    </a>
                    <header class="list-header">
                        <span class="list-category-badge" id="list-badge" style="display: none;">Category</span>
                        <h1 id="list-title">Search Results</h1>
                        <p class="list-subtitle" id="list-subtitle">Showing articles matching your query.</p>

                        <!-- Search Box & Suggestions -->
                        <div class="list-search-wrapper">
                            <div class="list-search-box">
                                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                                <input type="search" id="list-search-input" placeholder="Search guides..." aria-label="Search guides" autocomplete="off" />
                            </div>
                            <div class="suggestion-pills">
                                <span class="suggestion-pill-label">Suggestions:</span>
                                <button class="suggestion-pill" data-type="query" data-value="Getting Started">Getting Started</button>
                                <button class="suggestion-pill" data-type="recent">Recently Updated</button>
                                <button class="suggestion-pill" data-type="category" data-value="Guides">Guides</button>
                            </div>
                        </div>
                    </header>

                    <div id="list-results" class="results-list">
                        <div class="list-loading">Loading articles...</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <filenamer-footer></filenamer-footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            let currentQuery = (params.get('q') || '').trim();
            let currentCategory = (params.get('category') || '').trim();
            let currentFilter = (params.get('filter') || '').trim();

            const titleEl = document.getElementById('list-title');
            const subtitleEl = document.getElementById('list-subtitle');
            const badgeEl = document.getElementById('list-badge');
            const resultsContainer = document.getElementById('list-results');
            const searchInput = document.getElementById('list-search-input');
            const suggestionPills = document.querySelectorAll('.suggestion-pill');

            let searchIndexData = null;

            // Load and filter index initially
            fetch('search-index.json')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load search index');
                    return res.json();
                })
                .then(index => {
                    searchIndexData = index;
                    
                    // Initialize search input value
                    if (currentQuery) {
                        searchInput.value = currentQuery;
                    }

                    updateUI();
                })
                .catch(err => {
                    console.error(err);
                    resultsContainer.innerHTML = `<div class="list-error">Error loading search index. Please try again.</div>`;
                });

            // Set up search input listener for real-time filtering
            searchInput.addEventListener('input', () => {
                currentQuery = searchInput.value.trim();
                currentCategory = '';
                currentFilter = '';
                
                // Update URL parameters
                const newParams = new URLSearchParams();
                if (currentQuery) {
                    newParams.set('q', currentQuery);
                }
                history.replaceState(null, '', `?${newParams.toString()}`);
                
                updateUI();
            });

            // Set up suggestion pills click listener
            suggestionPills.forEach(pill => {
                pill.addEventListener('click', () => {
                    const type = pill.getAttribute('data-type');
                    const val = pill.getAttribute('data-value');

                    if (type === 'query') {
                        currentQuery = val;
                        currentCategory = '';
                        currentFilter = '';
                        searchInput.value = currentQuery;
                        
                        const newParams = new URLSearchParams();
                        newParams.set('q', currentQuery);
                        history.replaceState(null, '', `?${newParams.toString()}`);
                    } else if (type === 'category') {
                        currentQuery = '';
                        currentCategory = val;
                        currentFilter = '';
                        searchInput.value = '';
                        
                        const newParams = new URLSearchParams();
                        newParams.set('category', currentCategory);
                        history.replaceState(null, '', `?${newParams.toString()}`);
                    } else if (type === 'recent') {
                        currentQuery = '';
                        currentCategory = '';
                        currentFilter = 'recent';
                        searchInput.value = '';
                        
                        const newParams = new URLSearchParams();
                        newParams.set('filter', 'recent');
                        history.replaceState(null, '', `?${newParams.toString()}`);
                    }

                    updateUI();
                });
            });

            function updateUI() {
                if (!searchIndexData) return;

                // Update active state of pills
                suggestionPills.forEach(pill => {
                    const type = pill.getAttribute('data-type');
                    const val = pill.getAttribute('data-value');
                    
                    let isActive = false;
                    if (type === 'query' && currentQuery.toLowerCase() === (val || '').toLowerCase()) {
                        isActive = true;
                    } else if (type === 'category' && currentCategory.toLowerCase() === (val || '').toLowerCase()) {
                        isActive = true;
                    } else if (type === 'recent' && currentFilter === 'recent') {
                        isActive = true;
                    }
                    pill.classList.toggle('active', isActive);
                });

                let filtered = [];

                if (currentCategory) {
                    document.title = `${currentCategory} Articles — FileNamer Docs`;
                    titleEl.textContent = `${currentCategory} Articles`;
                    subtitleEl.textContent = `All documentation guides in the ${currentCategory} category.`;
                    badgeEl.textContent = 'Category';
                    badgeEl.style.display = 'inline-block';

                    filtered = searchIndexData.filter(item => item.category.toLowerCase() === currentCategory.toLowerCase());
                } else if (currentFilter === 'recent') {
                    document.title = `Recently Updated — FileNamer Docs`;
                    titleEl.textContent = 'Recently Updated';
                    subtitleEl.textContent = 'Showing recently updated documentation guides.';
                    badgeEl.style.display = 'none';

                    // Sort items by lastUpdated descending, return top 5
                    filtered = [...searchIndexData]
                        .filter(item => item.lastUpdated)
                        .sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated))
                        .slice(0, 5);
                } else if (currentQuery) {
                    document.title = `Search results for "${currentQuery}" — FileNamer Docs`;
                    titleEl.textContent = 'Search Results';
                    subtitleEl.innerHTML = `Showing articles matching "<strong class="highlight-term">${escapeHtml(currentQuery)}</strong>"`;
                    badgeEl.style.display = 'none';

                    const qLower = currentQuery.toLowerCase();
                    filtered = searchIndexData
                        .map(item => {
                            const titleLower = item.title.toLowerCase();
                            const categoryLower = item.category.toLowerCase();
                            
                            let score = 0;
                            if (titleLower === qLower) {
                                score += 100;
                            } else if (titleLower.startsWith(qLower)) {
                                score += 80;
                            } else if (titleLower.includes(qLower)) {
                                score += 50;
                            }
                            
                            if (categoryLower.includes(qLower)) {
                                score += 20;
                            }
                            if (item.headings.some(h => h.toLowerCase().includes(qLower))) {
                                score += 10;
                            }
                            if (item.excerpt.toLowerCase().includes(qLower)) {
                                score += 5;
                            }
                            return { item, score };
                        })
                        .filter(res => res.score > 0)
                        .sort((a, b) => b.score - a.score)
                        .map(res => res.item);
                } else {
                    document.title = `All Guides — FileNamer Docs`;
                    titleEl.textContent = 'All Guides';
                    subtitleEl.textContent = 'Browse all documentation guides in the FileNamer help center.';
                    badgeEl.style.display = 'none';
                    filtered = searchIndexData;
                }

                renderResults(filtered, currentQuery);
            }

            function escapeHtml(str) {
                return str.replace(/&/g, '&amp;')
                          .replace(/</g, '&lt;')
                          .replace(/>/g, '&gt;')
                          .replace(/"/g, '&quot;')
                          .replace(/'/g, '&#039;');
            }

            function highlightText(text, term) {
                if (!term) return escapeHtml(text);
                const escapedTerm = term.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`(${escapedTerm})`, 'gi');
                return escapeHtml(text).replace(regex, '<mark class="search-highlight">$1</mark>');
            }

            function renderResults(results, term) {
                if (results.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="list-empty-state">
                            <div class="empty-state-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </div>
                            <h3>No matching guides found</h3>
                            <p>We couldn't find any documentation matching your search criteria. Try using different keywords or browsing the categories.</p>
                            <button id="clear-search-btn" class="btn-primary" style="display: inline-block; margin-top: 1rem; border: none; cursor: pointer;">Clear Search</button>
                        </div>
                    `;
                    
                    document.getElementById('clear-search-btn').addEventListener('click', () => {
                        currentQuery = '';
                        currentCategory = '';
                        currentFilter = '';
                        searchInput.value = '';
                        history.replaceState(null, '', window.location.pathname);
                        updateUI();
                    });
                    return;
                }

                resultsContainer.innerHTML = results.map(item => {
                    const highlightedTitle = highlightText(item.title, term);
                    const highlightedExcerpt = highlightText(item.excerpt, term);
                    const categoryUrl = `list.html?category=${encodeURIComponent(item.category)}`;
                    
                    // Show a badge with the date if it's the "Recently Updated" view
                    const dateBadge = currentFilter === 'recent' && item.lastUpdated
                        ? `<span class="result-item-date">Updated: ${item.lastUpdated}</span>`
                        : '';
                    
                    return `
                        <div class="result-list-item">
                            <div class="result-item-meta">
                                <a href="${categoryUrl}" class="result-item-category">${escapeHtml(item.category)}</a>
                                ${dateBadge}
                            </div>
                            <h2 class="result-item-title">
                                <a href="${item.path}">${highlightedTitle}</a>
                            </h2>
                            <p class="result-item-excerpt">${highlightedExcerpt}</p>
                            <div class="result-item-action">
                                <a href="${item.path}" class="read-more-link">
                                    Read Guide
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                        <polyline points="12 5 19 12 12 19"></polyline>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        });
    </script>
</body>

</html>
